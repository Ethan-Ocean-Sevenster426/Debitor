{% load humanize %}
{% if pie.total %}
<div class="donut-wrap">
    <div class="donut" style="background: conic-gradient({{ pie.gradient }});">
        <div class="donut-hole">
            <div class="donut-total">{{ pie.total|intcomma }}</div>
            <div class="donut-cap">invoices</div>
        </div>
    </div>
</div>
<ul class="pie-legend">
    {% for s in pie.legend %}
    <li{% if not s.count %} class="zero"{% endif %}><span class="sw" style="background: {{ s.color }};"></span>{{ s.label }}
        <span class="ct">{{ s.count }} ({{ s.pct|floatformat:0 }}%)</span></li>
    {% endfor %}
</ul>
{% else %}
<p class="muted">No open invoices.</p>
{% endif %}
